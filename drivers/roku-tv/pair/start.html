<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      text-align: center;
    }
    h2 { margin-top: 0; }
    p { color: #666; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      font-size: 16px;
      border: 1px solid #007aff;
      background: #007aff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn.secondary {
      background: white;
      color: #007aff;
    }
  </style>
</head>
<body>
  <h2>Add a Roku</h2>
  <p>Search the network or enter the IP address manually.</p>
  <button class="btn" onclick="Homey.showView('list_devices')">Discover automatically</button>
  <button class="btn secondary" onclick="Homey.showView('manual')">Enter IP manually</button>
</body>
</html>
